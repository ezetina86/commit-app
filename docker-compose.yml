services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/app/data/habit.db
      - PORT=8080
      - NINJAS_API_KEY=${NINJAS_API_KEY}
    ports:
      - "9091:8080"
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "9092:80"
    depends_on:
      - api
    restart: unless-stopped

networks:
  default:
    name: commit_network
